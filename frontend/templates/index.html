{% extends "base.html" %}

{% block content %}
    <h2>{{ title }}</h2>
    <ul>
    {% for hotel in hotels %}
        <li>{{ hotel.name }} - {{ hotel.location }} - {{ hotel.description }}</li>
    {% endfor %}
    </ul>

    <a href="{{ url_for('new_item') }}">Crear un nuevo hotel</a>

{% endblock %}
