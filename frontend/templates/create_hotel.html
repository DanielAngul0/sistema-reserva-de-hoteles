{% extends "base.html" %}

{% block content %}
<section>
    <h2 class="page-title">Crear hotel</h2>
    <p>Usa este formulario para agregar nuevos hoteles al sistema.</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form action="{{ url_for('create_hotel') }}" method="POST">
        <label for="name">Nombre del hotel</label>
        <input type="text" id="name" name="name" required>

        <label for="location">Ciudad / ubicación</label>
        <input type="text" id="location" name="location" required>

        <label for="description">Descripción</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <label for="stars">Estrellas</label>
        <input type="number" id="stars" name="stars" min="1" max="5" required>

        <label for="price">Precio por noche (USD)</label>
        <input type="number" id="price" name="price" step="0.01" required>

        <button type="submit">Crear hotel</button>
    </form>
</section>
{% endblock %}
