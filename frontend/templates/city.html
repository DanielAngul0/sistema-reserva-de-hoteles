{% extends "base.html" %}

{% block content %}
<section>
    <h2 class="page-title">Hoteles en {{ city.capital }}</h2>
    <p>{{ city.description }}</p>
    <div class="grid">
        {% for hotel in hotels %}
        <article class="card">
            <div class="card-body">
                <h3>{{ hotel.name }}</h3>
                <p>{{ hotel.description }}</p>
                <span>{{ hotel.stars }} estrellas · Desde ${{ hotel.price }} USD / noche</span>
            </div>
            <div class="card-body">
                <a class="button-link" href="{{ url_for('hotel_detail', hotel_id=hotel.id) }}">Reservar hotel</a>
            </div>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
